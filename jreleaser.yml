project:
  name: truedoctales-4j
  description: "A story-based testing framework with custom annotations for writing expressive, narrative-driven test scenarios"
  authors:
    - Kay Landeck
  license: Apache-2.0
  inceptionYear: "2024"
  links:
    homepage: https://github.com/truedoctales/truedoctales-4j
    documentation: https://github.com/truedoctales/truedoctales-4j
    bugTracker: https://github.com/truedoctales/truedoctales-4j/issues

release:
  github:
    overwrite: true
    changelog:
      formatted: ALWAYS
      preset: conventional-commits
      contributors:
        format: "- {{contributorName}}"

# ---------------------------------------------------------------------------
# Signing
# ---------------------------------------------------------------------------
# JReleaser reads JRELEASER_GPG_PUBLIC_KEY, JRELEASER_GPG_SECRET_KEY and
# JRELEASER_GPG_PASSPHRASE directly from environment variables.
# No keyring import step needed in CI.
# ---------------------------------------------------------------------------
signing:
  active: ALWAYS
  armored: true

# ---------------------------------------------------------------------------
# Deploy
# ---------------------------------------------------------------------------
deploy:
  maven:
    github:
      truedoctales:
        active: ALWAYS
        url: "https://maven.pkg.github.com/truedoctales/truedoctales-4j"
        stagingRepositories:
          - target/staging-deploy
    mavenCentral:
      sonatype:
        active: ALWAYS
        url: https://central.sonatype.com/api/v1/publisher
        stagingRepositories:
          - target/staging-deploy
