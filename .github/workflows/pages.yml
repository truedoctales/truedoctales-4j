name: Deploy GitHub Pages

on:
  push:
    branches:
      - main

# Allow only one concurrent deployment, cancelling in-progress runs
concurrency:
  group: pages
  cancel-in-progress: true

# Grant the GITHUB_TOKEN the permissions required by the pages actions
permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    name: Build HTML report
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'
          cache: maven

      - name: Build and generate HTML report
        run: ./mvnw clean verify -pl truedoctales-sample-jupiter -am

      - name: Add CNAME for custom domain
        run: echo "www.truedoctales.dev" > truedoctales-sample-jupiter/target/truedoctales-html/CNAME

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: truedoctales-sample-jupiter/target/truedoctales-html

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
